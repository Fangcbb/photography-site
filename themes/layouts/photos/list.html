{{ define "main" }}

  {{ range .Pages }}

    <a href="{{ .RelPermalink }}">
      <img src="{{ .Params.cover.image }}" style="width:100%; border-radius:6px;">
    </a>
  </div>
  {{ end }}
</div>
{{ end }}

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());

    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    document.getElementById('theme-toggle').onclick = () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    };

    function toggleMenu(){
      document.getElementById('site-nav').classList.toggle('active');
      document.querySelector('.hamburger').classList.toggle('active');
    }

    const firstMenuLink = document.querySelector('.menu-item-has-children > a');
    if (firstMenuLink) {
      firstMenuLink.addEventListener('click', function(e){
        if (window.innerWidth <= 768) {
          e.preventDefault();
          this.parentElement.classList.toggle('active');
        }
      });
    }

    function toggleLang(){
      const t = document.querySelector('.lang-toggle');
      const isZh = t.textContent.trim() === '中';
      document.querySelectorAll('[data-en][data-zh]').forEach(el => {
        el.textContent = isZh ? el.dataset.zh : el.dataset.en;
      });
      t.textContent = isZh ? 'EN' : '中';
      localStorage.setItem('site_lang', isZh ? 'zh' : 'en');
    }

    (function(){
      const savedLang = localStorage.getItem('site_lang');
      if (savedLang === 'zh') return;
      if (savedLang === 'en') {
        document.querySelectorAll('[data-en][data-zh]').forEach(el => {
          el.textContent = el.dataset.en;
        });
        const t = document.querySelector('.lang-toggle');
        if (t) t.textContent = 'EN';
      }
    })();

    (function(){
      const audio = document.getElementById('bg-music');
      if (!audio) return;

      const tracks = ["\/music\/1.mp3","\/music\/2.mp3"];

      if (!tracks.length) return;

      audio.src = tracks[Math.floor(Math.random()*tracks.length)];

      const toggleBtn = document.getElementById('music-toggle');
      const muteBtn = document.getElementById('music-mute');
      const iconPlay = document.getElementById('icon-play');
      const iconPause = document.getElementById('icon-pause');
      const iconVolume = document.getElementById('icon-volume');
      const iconMuted = document.getElementById('icon-muted');
      const STORAGE_KEY = 'site_music_state_v1';
      const VOLUME_KEY = 'site_music_volume_v1';
      const defaultVolume = 0.35;
      const savedState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const savedVolume = parseFloat(localStorage.getItem(VOLUME_KEY));
      audio.volume = Number.isFinite(savedVolume) ? savedVolume : defaultVolume;

      let hasUserInteracted = false;

      function updatePlayUI(isPlaying){
        iconPlay.style.display = isPlaying ? 'none' : 'inline-flex';
        iconPause.style.display = isPlaying ? 'inline-flex' : 'none';
      }

      function updateMuteUI(isMuted){
        iconVolume.style.display = isMuted ? 'none' : 'inline-flex';
        iconMuted.style.display = isMuted ? 'inline-flex' : 'none';
      }

      function saveState(){
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ playing: !audio.paused, muted: audio.muted }));
        localStorage.setItem(VOLUME_KEY, String(audio.volume));
      }

      async function tryAutoPlay(){
        audio.muted = typeof savedState.muted === 'boolean' ? savedState.muted : false;
        updateMuteUI(audio.muted);
        const shouldResume = savedState.playing !== false;
        if (!shouldResume) { updatePlayUI(false); return; }
        try {
          await audio.play();
          updatePlayUI(true);
          saveState();
        } catch(e) {
          updatePlayUI(false);
        }
      }

      function startWithSoundAfterInteraction(){
        if (hasUserInteracted) return;
        hasUserInteracted = true;
        if (savedState.playing !== false) {
          audio.play().then(() => {
            updatePlayUI(true);
            saveState();
          }).catch(()=>{});
        }
      }

      toggleBtn.addEventListener('click', async () => {
        if (audio.paused) {
          try { await audio.play(); updatePlayUI(true); } catch(e){}
        } else {
          audio.pause();
          updatePlayUI(false);
        }
        saveState();
      });

      muteBtn.addEventListener('click', () => {
        audio.muted = !audio.muted;
        updateMuteUI(audio.muted);
        saveState();
      });

      audio.addEventListener('play', () => { updatePlayUI(true); saveState(); });
      audio.addEventListener('pause', () => { updatePlayUI(false); saveState(); });

      ['click','touchstart','scroll','keydown'].forEach(ev => {
        window.addEventListener(ev, startWithSoundAfterInteraction, { once:true, passive:true });
      });

      updatePlayUI(false);
      updateMuteUI(audio.muted);
      tryAutoPlay();
    })();

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

{{ define "main" }}
<section class="photo-home">
  <div class="photo-grid">
    {{ range where site.RegularPages "Section" "photos" }}
      <article class="photo-card">
        <a href="{{ .RelPermalink }}" class="photo-link">
          {{ $img := .Params.cover.image | default .Params.image }}
          {{ if $img }}
            <img src="{{ $img }}" alt="{{ .Title }}" loading="lazy">
          {{ end }}
          <div class="photo-meta">
            <h2>{{ .Title }}</h2>
            {{ with .Params.location }}<p>{{ . }}</p>{{ end }}
          </div>
        </a>
      </article>
    {{ end }}
  </div>
</section>

<style>
.photo-home{
  width:100%;
  max-width:1600px;
  margin:0 auto;
  padding:24px 20px 48px;
}
.photo-grid{
  column-count:3;
  column-gap:18px;
}
.photo-card{
  break-inside:avoid;
  margin:0 0 18px;
}
.photo-link{
  position:relative;
  display:block;
  overflow:hidden;
  border-radius:10px;
  background:#111;
  text-decoration:none;
}
.photo-link img{
  width:100%;
  display:block;
  height:auto;
  transition:transform .5s ease, opacity .35s ease;
}
.photo-link:hover img{
  transform:scale(1.02);
  opacity:.92;
}
.photo-meta{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:18px 16px 14px;
  color:#fff;
  background:linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,0));
  opacity:0;
  transition:opacity .3s ease;
}
.photo-link:hover .photo-meta{
  opacity:1;
}
.photo-meta h2{
  margin:0;
  font-size:15px;
  font-weight:600;
  line-height:1.4;
}
.photo-meta p{
  margin:6px 0 0;
  font-size:12px;
  opacity:.85;
}
@media (max-width: 1100px){
  .photo-grid{ column-count:2; }
}
@media (max-width: 700px){
  .photo-home{ padding:18px 14px 36px; }
  .photo-grid{ column-count:1; column-gap:0; }
  .photo-card{ margin-bottom:14px; }
  .photo-meta{ opacity:1; }
}
</style>
{{ end }}

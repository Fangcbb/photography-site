{{ define "main" }}

<p class="page-title">Media Library</p>

<div class="gallery" id="gallery">
  {{ range (where site.RegularPages "Section" "photos").ByWeight }}
    {{ $img := .Params.cover.image }}
    <div class="gallery-item"
         data-src="{{ $img }}"
         data-title="{{ .Title }}"
         data-location="{{ .Params.location }}">
         
      <img loading="lazy" src="{{ $img }}" alt="{{ .Title }}">

      <!-- hover 信息 -->
      <div class="overlay">
        <div class="overlay-text">
          <div class="title">{{ .Title }}</div>
          <div class="location">{{ .Params.location }}</div>
        </div>
      </div>

    </div>
  {{ end }}
</div>

<!-- 全屏 -->
<div class="fullscreen" id="fullscreen">
  <span class="fullscreen-close" onclick="closeFullscreen()">&times;</span>
  <img id="fullscreen-img" src="">
</div>

<style>

.page-title {
  font-size:12px;
  letter-spacing:.2em;
  color:#888;
  margin-bottom:40px;
}

/* 瀑布流 */
.gallery {
  column-count:3;
  column-gap:35px;
}

.gallery-item {
  position:relative;
  break-inside:avoid;
  margin-bottom:35px;
  cursor:pointer;
  overflow:hidden;
}

/* 图片动画 */
.gallery-item img {
  width:100%;
  display:block;
  opacity:0;
  transform:scale(1.05);
  transition:all .6s ease;
}

.gallery-item img.loaded {
  opacity:1;
  transform:scale(1);
}

/* hover overlay */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
  opacity:0;
  transition:.3s;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

.gallery-item:hover .overlay {
  opacity:1;
}

.overlay-text {
  color:white;
}

.title {
  font-size:14px;
  font-weight:500;
}

.location {
  font-size:12px;
  opacity:0.7;
}

/* 全屏 */
.fullscreen {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.fullscreen.active {
  display:flex;
}

.fullscreen img {
  max-width:90%;
  max-height:90%;
}

.fullscreen-close {
  position:absolute;
  top:30px;
  right:40px;
  font-size:40px;
  color:white;
  cursor:pointer;
}

/* 响应式 */
@media (max-width:800px){
  .gallery { column-count:2; }
}
@media (max-width:500px){
  .gallery { column-count:1; }
}

</style>

<script>

const images = document.querySelectorAll('.gallery-item img');

// 图片加载动画
images.forEach(img=>{
  img.onload = () => {
    img.classList.add('loaded');
  }
});

// 点击放大
const fullscreen = document.getElementById('fullscreen');
const fullscreenImg = document.getElementById('fullscreen-img');

document.querySelectorAll('.gallery-item').forEach(item=>{
  item.onclick = ()=>{
    fullscreenImg.src = item.dataset.src;
    fullscreen.classList.add('active');
  }
});

function closeFullscreen(){
  fullscreen.classList.remove('active');
}

// ESC关闭
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape') closeFullscreen();
});

</script>

{{ end }}

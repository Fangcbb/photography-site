{{ define "main" }}

<p class="page-title">Media Library</p>

<div class="gallery">
  {{ range (where site.RegularPages "Section" "photos") }}
    {{ $img := .Params.cover.image }}
    <div class="gallery-item">
      <img src="{{ $img }}" alt="{{ .Title }}">
    </div>
  {{ end }}
</div>

<div class="fullscreen" id="fullscreen">
  <span class="fullscreen-close" onclick="closeFullscreen()">&times;</span>
  <img id="fullscreen-img" src="">
  <div class="zoom-hint">滚轮缩放 · 双击还原</div>
</div>

<style>
.gallery { column-count:3; column-gap:35px; }
.gallery-item { break-inside:avoid; margin-bottom:35px; cursor:pointer; }
.gallery-item img { width:100%; transition:0.3s; }
.gallery-item:hover img { transform:scale(1.05); }

.fullscreen { display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.85); }
.fullscreen.active { display:flex; justify-content:center; align-items:center; }
.fullscreen img { max-width:90%; max-height:90%; }
</style>

<script>
const fullscreen=document.getElementById('fullscreen');
const fullscreenImg=document.getElementById('fullscreen-img');

document.querySelectorAll('.gallery-item img').forEach(img=>{
  img.onclick=()=>{
    fullscreenImg.src=img.src;
    fullscreen.classList.add('active');
  }
});

function closeFullscreen(){
  fullscreen.classList.remove('active');
}
</script>

{{ end }}`D2`D2`D2`D2

{{ define "main" }}
{{ $img := .Params.cover.image | default .Params.image }}
<article class="photo-single">
  <div class="photo-single-inner">
    {{ if $img }}
      <div class="photo-single-image-wrap">
        <img id="main-photo" src="{{ $img }}" alt="{{ .Title }}" class="photo-single-image">
      </div>
    {{ end }}

    <div class="photo-single-info">
      <h1>{{ .Title }}</h1>
      {{ with .Params.location }}<p class="meta-line">{{ . }}</p>{{ end }}
      {{ with .Date }}<p class="meta-line">{{ .Format "2006-01-02" }}</p>{{ end }}
      <div class="photo-single-content">
        {{ .Content }}
      </div>
    </div>
  </div>
</article>

<style>
.photo-single{
  max-width:1500px;
  margin:0 auto;
  padding:28px 20px 60px;
}
.photo-single-inner{
  display:grid;
  grid-template-columns:minmax(0, 1fr) 320px;
  gap:32px;
  align-items:start;
}
.photo-single-image-wrap{
  background:#111;
  border-radius:10px;
  overflow:hidden;
}
.photo-single-image{
  width:100%;
  display:block;
  cursor:zoom-in;
}
.photo-single-info h1{
  margin:0 0 12px;
  font-size:28px;
  line-height:1.2;
}
.meta-line{
  margin:0 0 8px;
  font-size:13px;
  opacity:.72;
}
.photo-single-content{
  margin-top:18px;
  font-size:14px;
  line-height:1.8;
}
@media (max-width: 960px){
  .photo-single-inner{
    grid-template-columns:1fr;
    gap:20px;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const img = document.getElementById('main-photo');
  if (!img) return;

  let overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
    cursor:zoom-out;
    padding:24px;
  `;

  let full = document.createElement('img');
  full.src = img.src;
  full.style.cssText = `
    max-width:96vw;
    max-height:96vh;
    object-fit:contain;
    box-shadow:0 20px 80px rgba(0,0,0,.4);
  `;

  overlay.appendChild(full);
  document.body.appendChild(overlay);

  img.addEventListener('click', function () {
    overlay.style.display = 'flex';
  });

  overlay.addEventListener('click', function () {
    overlay.style.display = 'none';
  });
});
</script>
{{ end }}

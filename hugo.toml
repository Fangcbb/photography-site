baseURL = "https://fangc.cc/"
languageCode = "zh-cn"
title = "我的摄影作品集"
theme = "PaperMod"

[pagination]
  pagerSize = 24

[params]
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = false
  disableSpecial1stPost = true
  mainSections = ["photos"]

  logo = "/gallery/logo.svg"
  faviconSvg = "/gallery/favicon.svg"
  faviconIco = "/gallery/favicon.ico"

  blogUrl = "/blog/"
  contactEmail = "fangbing1@hfcmi.com"
  musicTracks = ["/music/1.mp3", "/music/2.mp3"]

  # 图片 CDN 域名，后面模板里会用到
  cdnURL = "https://cdn.fangc.cc"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "photos"
  name = "作品"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 2

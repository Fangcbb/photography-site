baseURL = "https://mellifluous-fudge-5d83bd.netlify.app/"
languageCode = "zh-cn"
title = "我的摄影作品集"
theme = "PaperMod"

[pagination]
  pagerSize = 24

[params]
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = false
  disableSpecial1stPost = true
  mainSections = ["photos"]

  # 👇 你这套高级首页用到的配置
  logo = "/gallery/logo.svg"
  faviconSvg = "/gallery/favicon.svg"
  faviconIco = "/gallery/favicon.ico"

  # 👉 这里改成站内（推荐）
  blogUrl = "/blog/"

  contactEmail = "fangbing1@hfcmi.com"

  # 👉 音乐播放器（可以先留着）
  musicTracks = ["/music/1.mp3", "/music/2.mp3"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "photos"
  name = "作品"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 2

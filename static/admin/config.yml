backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/images"

collections:
  - name: "photos"
    label: "摄影作品"
    label_singular: "作品"
    folder: "content/photos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "地点", name: "location", widget: "string", required: false }
      - { label: "排序", name: "weight", widget: "number", default: 1, required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - label: "封面图"
        name: "cover"
        widget: "object"
        fields:
          - { label: "图片", name: "image", widget: "image" }
          - { label: "说明", name: "alt", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown", required: false }

  - name: "pages"
    label: "页面"
    files:
      - label: "关于"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "草稿", name: "draft", widget: "boolean", default: false }
          - { label: "正文", name: "body", widget: "markdown" }
